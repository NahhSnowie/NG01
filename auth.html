<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập / Đăng ký</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body class="auth-page">
    <div class="auth-form" id="authForm">
        <a class="back-link" href="index.html"><i class="fas fa-arrow-left"></i> Về trang chủ</a>
        <div class="auth-header">
            <h2><i class="fas fa-user-circle" style="color:#2a7de1;"></i> Đăng nhập / Đăng ký</h2>
        </div>
        <div class="form-row">
            <div class="form-group" id="authNameGroup" style="display:block;">
                <label><i class="fas fa-id-card"></i> Tên công ty</label>
                <input type="text" id="authNameInput" placeholder="Tên công ty" />
            </div>
            <div class="form-group" id="authEmailGroup" style="display:none;">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="authEmail" placeholder="Email công ty" />
            </div>
            <div id="authExtraFields" style="display:none;">
                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> Địa chỉ</label>
                    <input type="text" id="authAddressInput" placeholder="Địa chỉ công ty" />
                </div>
                <div class="form-group">
                    <label><i class="fas fa-id-card-alt"></i> Mã số thuế</label>
                    <input type="text" id="authTaxInput" placeholder="Mã số thuế" />
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Mật khẩu</label>
                    <input type="password" id="authConfirmPasswordInput" placeholder="Mật khẩu" />
                </div>
            </div>
            <div class="form-group" id="authPasswordGroup">
                <label><i class="fas fa-lock"></i> Xác nhận mật khẩu</label>
                <input type="password" id="authPassword" placeholder="Nhập mật khẩu" />
            </div>
        </div>
        <div class="form-actions">
            
            <button class="btn-submit" id="authSubmitBtn"><i class="fas fa-sign-in-alt"></i> Đăng nhập</button>
        </div>
        <div class="auth-switch">
            <span id="authModeText">Chưa có tài khoản?</span>
            <button type="button" id="toggleAuthModeBtn" class="btn-link">Đăng ký</button>
        </div>
        <div class="auth-message" id="authMessage"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
