<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi tiết tin tuyển dụng</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
    <div class="app detail-page">
        <div class="header detail-header">
            <div class="logo">
                <i class="fas fa-briefcase"></i>
                <h1>Chi tiết <span>tin</span></h1>
            </div>
            <div class="header-actions">
                <!-- <a class="btn-login" href="index.html"><i class="fas fa-arrow-left"></i> Về trang chủ</a> -->
            </div>
        </div>

        <div class="detail-card" id="detailCard">
            <div class="detail-badge" id="detailBadge">Đang tải...</div>
            <h2 id="detailTitle">Đang tải...</h2>
            <div class="detail-company" id="detailCompany"></div>
            <div class="detail-meta">
                <span><i class="fas fa-map-marker-alt"></i> <span id="detailLocation">...</span></span>
                <span><i class="fas fa-clock"></i> <span id="detailTime">...</span></span>
            </div>
            <div class="detail-content">
                <h3><i class="fas fa-align-left"></i> Mô tả công việc</h3>
                <p id="detailDescription">...</p>
            </div>
            <div class="detail-contact">
                <h3><i class="fas fa-address-card"></i> Thông tin liên hệ</h3>
                <p id="detailContact">Đang tải...</p>
            </div>
            <div class="detail-actions">
                <a class="btn-apply" id="detailApplyBtn" href="#">Ứng tuyển ngay</a>
                <a class="btn-apply outline" id="detailCVListBtn" href="#" style="display:none;">
                    <i class="fas fa-list"></i> Xem CV ứng viên
                </a>
                <a class="btn-login" href="index.html"><i class="fas fa-home"></i> Quay lại</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="/js/job-detail.js"></script>
</body>
</html>
